# Logging parameters
folder: checkpoints/

# LeJEPA parameters
lambda: 0.03

# AdamW parameters
weight_decay: 0.01
lr: 4e-4

# Model parameters
model: deit_1
embedding_dim: 256

# Training parameters
lr_scheduler: warmup_cosine # None
grad_clip: 5

device: cuda
dtype: bfloat16
epochs: 200
batch_size: 128
num_workers: 16
global_views: 3
local_views: 8